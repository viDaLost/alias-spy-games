<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Библейские игры</title>

  <meta name="theme-color" content="#fdfaf4" />
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Игры">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="style.css?v=8" />
</head>
<body>

  <header>
    <h1> ҕиҕлᴇйскиᴇ иrᴘы </h1>
  </header>

  <div id="main-loader" style="position:fixed; inset:0; background:var(--bg-color); z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: var(--accent-active); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 1rem; font-weight: 600; color: var(--text-color);">Проверка доступа...</p>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>

  <div class="menu-container hidden" id="menu-container">
    <div class="menu-section-title">Игры для компании</div>

    <div class="menu-grid">
      <button onclick="showGame('alias')" class="game-button">🎮 Алиас</button>
      <button onclick="showGame('coimaginarium')" class="game-button">🧠 Соображариум</button>
      <button onclick="showGame('guess')" class="game-button">👥 Угадай персонажа</button>
      <button onclick="showGame('describe')" class="game-button">🗣 Опиши, но не называй</button>
      <button onclick="showGame('spy')" class="game-button">🕵️‍♂ Шпион</button>
      <button onclick="showGame('quartet')" class="game-button">🃏 Квартет</button>
    </div>

    <div class="menu-divider"></div>
    <div class="menu-section-title">Словесные</div>

    <div class="menu-grid menu-grid--single">
      <button onclick="showGame('bible-wow')" class="game-button game-button--wide">
        🧩 Библейские слова
      </button>

      <button onclick="showGame('bible-wordsearch')" class="game-button game-button--wide">
        🔎 Поиск библейских слов
      </button>

      <button onclick="showGame('sacred-word')" class="game-button game-button--wide">
        🪔 Священное слово
      </button>
    </div>

    <div class="menu-divider"></div>
    <div class="menu-section-title">Для детей</div>

    <div class="menu-grid menu-grid--single">
      <button onclick="showGame('kids-ark-pairs')" class="game-button game-button--wide">🛳️ Найди пару</button>
    </div>

    <div class="menu-divider"></div>
    <div class="menu-grid menu-grid--single">
      <button onclick="showSupportModal()" class="game-button game-button--wide" style="background: #e2e8f0; color: #1e293b; border: 1px solid #cbd5e1;">
        🛠 Тех-поддержка
      </button>
    </div>
  </div>

  <div id="banned-screen" class="hidden" style="text-align: center; padding: 2rem; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <h2 style="color: #ef4444; font-weight: 800; margin-bottom: 1rem;">Доступ к приложению ограничен</h2>
    <p style="color: #475569; margin-bottom: 2rem;">Обжаловать блокировку можно через техническую поддержку.</p>
    <button class="game-button" onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/D_a_n_Vi')" style="max-width: 250px;">Написать</button>
  </div>

  <div id="game-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=3"></script>
  <script src="app.js?v=5" defer></script>
</body>
</html>
