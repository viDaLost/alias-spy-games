<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Библейские игры</title>

  <meta name="theme-color" content="#fdfaf4" />
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Игры">

  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>

  <header>
    <h1> ҕиҕлᴇйскиᴇ иrᴘы </h1>
  </header>

  <div class="menu-container" id="menu-container">
    <div class="menu-section-title">Игры для компании</div>

    <div class="menu-grid">
      <button onclick="showGame('alias')" class="game-button">🎮 Алиас</button>
      <button onclick="showGame('coimaginarium')" class="game-button">🧠 Соображариум</button>
      <button onclick="showGame('guess')" class="game-button">👥 Угадай персонажа</button>
      <button onclick="showGame('describe')" class="game-button">🗣 Опиши, но не называй</button>
      <button onclick="showGame('spy')" class="game-button">🕵️‍♂ Шпион</button>
      <button onclick="showGame('quartet')" class="game-button">🃏 Квартет</button>
    </div>

    <div class="menu-divider"></div>
    <div class="menu-section-title">Словесные</div>

    <div class="menu-grid menu-grid--single">
      <button onclick="showGame('bible-wow')" class="game-button game-button--wide">
        🧩 Библейские слова
      </button>

      <button onclick="showGame('bible-wordsearch')" class="game-button game-button--wide">
        🔎 Поиск библейских слов
      </button>

      <button onclick="showGame('sacred-word')" class="game-button game-button--wide">
        🪔 Священное слово
      </button>
    </div>

    <div class="menu-divider"></div>
    <div class="menu-section-title">Для детей</div>

    <div class="menu-grid menu-grid--single">
      <button onclick="showGame('kids-ark-pairs')" class="game-button game-button--wide">🛳️ Найди пару</button>
    </div>

    <div class="menu-divider"></div>
    <div class="menu-grid menu-grid--single">
      <button onclick="showSupportModal()" class="game-button game-button--wide" style="background: #e2e8f0; color: #1e293b; border: 1px solid #cbd5e1;">
        🛠 Тех-поддержка
      </button>
    </div>
  </div>

  <div id="game-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=3"></script>
  <script src="app.js?v=3" defer></script>
</body>
</html>
