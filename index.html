<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Библейские игры</title>

  <meta name="theme-color" content="#DBEAFE" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Игры">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=31" />
</head>
<body>
  <div class="blob-bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div id="main-loader" class="main-loader">
    <div class="loader-ring"></div>
    <p>Проверка доступа...</p>
  </div>

  <main class="menu-container hidden" id="menu-container">
    <header class="main-title">
      <h1>Библейские игры</h1>
      <p>Во что будем играть?</p>
    </header>

    <section class="menu-section menu-anim" style="--delay:0ms">
      <h2 class="menu-section-title">Игры для компании</h2>
      <div class="menu-grid">
        <button onclick="showGame('alias')" class="game-button app-game-card" type="button">
          <span class="game-icon" data-app-icon="alias"></span>
          <span class="game-label">Алиас</span>
        </button>
        <button onclick="showGame('coimaginarium')" class="game-button app-game-card" type="button">
          <span class="game-icon" data-app-icon="coimaginarium"></span>
          <span class="game-label">Соображариум</span>
        </button>
        <button onclick="showGame('guess')" class="game-button app-game-card" type="button">
          <span class="game-icon" data-app-icon="guess"></span>
          <span class="game-label">Угадай персонажа</span>
        </button>
        <button onclick="showGame('describe')" class="game-button app-game-card" type="button">
          <span class="game-icon" data-app-icon="describe"></span>
          <span class="game-label">Опиши, но не называй</span>
        </button>
        <button onclick="showGame('spy')" class="game-button app-game-card" type="button">
          <span class="game-icon" data-app-icon="spy"></span>
          <span class="game-label">Шпион</span>
        </button>
        <button onclick="showGame('quartet')" class="game-button app-game-card" type="button">
          <span class="game-icon" data-app-icon="quartet"></span>
          <span class="game-label">Квартет</span>
        </button>
      </div>
    </section>

    <section class="menu-section menu-anim" style="--delay:90ms">
      <h2 class="menu-section-title">Словесные</h2>
      <div class="menu-grid">
        <button onclick="showGame('bible-wow')" class="game-button app-game-card" type="button">
          <span class="game-icon" data-app-icon="bible-wow"></span>
          <span class="game-label">Библейские слова</span>
        </button>
        <button onclick="showGame('bible-wordsearch')" class="game-button app-game-card" type="button">
          <span class="game-icon" data-app-icon="bible-wordsearch"></span>
          <span class="game-label">Поиск библейских слов</span>
        </button>
        <button onclick="showGame('sacred-word')" class="game-button app-game-card" type="button">
          <span class="game-icon" data-app-icon="sacred-word"></span>
          <span class="game-label">Священное слово</span>
        </button>
      </div>
    </section>

    <section class="menu-section menu-anim" style="--delay:180ms">
      <h2 class="menu-section-title">Для детей</h2>
      <div class="menu-grid menu-grid--single">
        <button onclick="showGame('kids-ark-pairs')" class="game-button app-game-card app-game-card--wide" type="button">
          <span class="game-icon" data-app-icon="kids-ark-pairs"></span>
          <span class="game-label">Найди пару</span>
        </button>
      </div>
    </section>

    <section class="menu-actions menu-anim" id="menu-actions" style="--delay:260ms">
      <button onclick="showSupportModal()" class="support-menu-btn" type="button">
        <span class="support-menu-btn__icon" data-app-icon="support"></span>
        <span>Тех-поддержка</span>
      </button>
    </section>
  </main>

  <section id="game-screen" class="game-screen hidden">
    <div class="game-shell">
      <div class="game-runner-top">
        <button onclick="goToMainMenu()" class="runner-back" type="button" aria-label="Назад">
          <span data-app-icon="arrow-left"></span>
        </button>
        <h2 id="runner-title">Игра</h2>
        <div id="runner-icon" class="runner-icon"></div>
      </div>
      <div id="game-container"></div>
    </div>
  </section>

  <section id="banned-screen" class="banned-screen hidden">
    <div class="banned-card">
      <div class="banned-icon" data-app-icon="ban"></div>
      <h2>Доступ к приложению ограничен</h2>
      <p>Обжаловать блокировку можно через техническую поддержку.</p>
      <button class="banned-button" onclick="openSupportLink()" type="button">Написать в поддержку</button>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js?v=31" defer></script>
</body>
</html>
