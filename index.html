<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Библейские игры</title>

  <meta name="theme-color" content="#f8f9ff" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Игры">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=9" />
</head>
<body>

  <header class="app-header">
    <div class="app-title-block">
      <div class="app-kicker">игры для общения</div>
      <h1>Библейские игры</h1>
    </div>
    <div id="user-profile" class="user-profile fade-in" aria-live="polite"></div>
  </header>

  <div id="main-loader" class="main-loader">
    <div class="loader-ring"></div>
    <p>Проверка доступа...</p>
  </div>

  <main class="menu-container hidden" id="menu-container">
    <section class="menu-section">
      <div class="menu-section-title">Игры для компании</div>
      <div class="menu-grid">
        <button onclick="showGame('alias')" class="game-button">
          <span class="game-button__icon">🗣️</span>
          <span class="game-button__text">Алиас</span>
        </button>
        <button onclick="showGame('coimaginarium')" class="game-button">
          <span class="game-button__icon">🧠</span>
          <span class="game-button__text">Соображариум</span>
        </button>
        <button onclick="showGame('guess')" class="game-button">
          <span class="game-button__icon">👥</span>
          <span class="game-button__text">Угадай персонажа</span>
        </button>
        <button onclick="showGame('describe')" class="game-button">
          <span class="game-button__icon">💬</span>
          <span class="game-button__text">Опиши, но не называй</span>
        </button>
        <button onclick="showGame('spy')" class="game-button">
          <span class="game-button__icon">🕵️‍♂️</span>
          <span class="game-button__text">Шпион</span>
        </button>
        <button onclick="showGame('quartet')" class="game-button">
          <span class="game-button__icon">🃏</span>
          <span class="game-button__text">Квартет</span>
        </button>
      </div>
    </section>

    <section class="menu-section">
      <div class="menu-section-title">Словесные головоломки</div>
      <div class="menu-grid">
        <button onclick="showGame('bible-wow')" class="game-button">
          <span class="game-button__icon">🧩</span>
          <span class="game-button__text">Библейские слова</span>
        </button>
        <button onclick="showGame('bible-wordsearch')" class="game-button">
          <span class="game-button__icon">🔎</span>
          <span class="game-button__text">Поиск библейских слов</span>
        </button>
        <button onclick="showGame('sacred-word')" class="game-button">
          <span class="game-button__icon">🪔</span>
          <span class="game-button__text">Священное слово</span>
        </button>
      </div>
    </section>

    <section class="menu-section">
      <div class="menu-section-title">Для детей</div>
      <div class="menu-grid">
        <button onclick="showGame('kids-ark-pairs')" class="game-button">
          <span class="game-button__icon">🛳️</span>
          <span class="game-button__text">Найди пару</span>
        </button>
      </div>
    </section>

    <section class="menu-section menu-section--support">
      <div class="menu-grid menu-grid--single">
        <button onclick="showSupportModal()" class="game-button support-menu-button">
          <span class="game-button__icon">🛠</span>
          <span class="game-button__text">Тех-поддержка</span>
        </button>
      </div>
    </section>
  </main>

  <section id="banned-screen" class="banned-screen hidden">
    <div class="card banned-card">
      <div class="banned-icon">⛔</div>
      <h2>Доступ к приложению ограничен</h2>
      <p>Обжаловать блокировку можно через техническую поддержку.</p>
      <button class="game-button game-button--wide" onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/D_a_n_Vi')">
        <span class="game-button__icon">💬</span>
        <span class="game-button__text">Написать</span>
      </button>
    </div>
  </section>

  <div id="game-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js?v=7" defer></script>
</body>
</html>
