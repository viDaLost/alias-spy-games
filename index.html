<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Библейские игры</title>
  <meta name="theme-color" content="#eaf3ff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Игры" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=17" />
</head>
<body>
  <header class="app-header">
    <p class="app-kicker">Мини-игры для компании</p>
    <h1>Библейские игры</h1>
    <p class="app-subtitle">Выберите игру и начните партию</p>
  </header>

  <div id="main-loader" class="app-loader" aria-live="polite">
    <div class="app-loader__ring"></div>
    <p>Проверка доступа...</p>
  </div>

  <main class="menu-container hidden" id="menu-container">
    <section class="menu-section">
      <div class="menu-section-title">Игры для компании</div>
      <div class="menu-grid" id="company-games"></div>
    </section>

    <section class="menu-section">
      <div class="menu-section-title">Словесные</div>
      <div class="menu-grid" id="word-games"></div>
    </section>

    <section class="menu-section">
      <div class="menu-section-title">Для детей</div>
      <div class="menu-grid" id="kids-games"></div>
    </section>

    <section class="menu-section">
      <div class="menu-grid" id="system-actions"></div>
    </section>
  </main>

  <section id="banned-screen" class="hidden banned-screen">
    <div class="banned-card">
      <h2>Доступ ограничен</h2>
      <p>Обжаловать блокировку можно через техническую поддержку.</p>
      <button class="game-button" onclick="openSupportChat()">Написать</button>
    </div>
  </section>

  <main id="game-container" aria-live="polite"></main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="app.js?v=17" defer></script>
</body>
</html>
